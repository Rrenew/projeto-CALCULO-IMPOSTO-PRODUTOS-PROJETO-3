<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de impostos</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <section>
        <h1>Cadastro de Produto</h1>
        <form id="produtoForm">
            <input type="text" id="produto" placeholder="Nome do produto" required>
            <textarea id="caracteristicas" placeholder="Caracteristicas do Produto" required>
            <input type="number" id="valorUnitario" placeholder="Valor Unitario" required></textarea>
            <select id="unidade" required>
                <option value="">Selecione Unidade</option>
                <option value="unidade">Unidade</option>
                <option value="kg">Kg</option>
            </select>
            <div>
                <label><input type="radio" name="tipoProduto" value="1"> Isento </label>
                <label><input type="radio" name="tipoProduto" value="2"> TIpo 2 (8%)</label>
                <label><input type="radio" name="tipoProduto" value="3"> TIpo 3 (10%)</label>   
                <label><input type="radio" name="tipoProduto" value="4"> TIpo 4 (12%)</label>
                <label><input type="radio" name="tipoProduto" value="5"> TIpo 5 (17%)</label>
            </div>
            <button type="submit"> Adicionar Produto</button>    
        </form>
    </section>

<!--produtos cadastrados-->
    <section id="produtoList"> </section>
        
<script src="script/script.js"></script>

</body>
</html>
