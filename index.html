<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo Imposto Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Cálculo Imposto Produtos</h1>
            <p>Sistema de cadastro e cálculo de tributação de produtos</p>
        </header>

        <main>
            
            
            <!-- FORMULÁRIO DE CADASTRO -->
            <section class="form-section">
                <h2>Cadastro de Produto</h2>
                <form id="produtoForm">
                    


                    <div class="form-group">
                        <label for="produto">Produto:</label>
                        <input type="text" id="produto" name="produto" placeholder="Nome do produto" required>
                    </div>



                    <div class="form-group">
                        <label for="caracteristicas">Características:</label>
                        <textarea id="caracteristicas" name="caracteristicas" rows="4" placeholder="Descreva as características do produto" required
                        ></textarea>
                    </div>




                    <div class="form-row">
                        <div class="form-group">
                            <label for="valorUnitario">Valor Unitário (R$):</label>
                            <input type="number" id="valorUnitario" name="valorUnitario" placeholder="0.00" step="0.01" min="0" required>
                        </div>




                        <div class="form-group">
                            <label for="unidade">Unidade:</label>
                            <select id="unidade" name="unidade" required>
                                <option value="">Selecione uma unidade</option>
                                <option value="UN">Unidade (UN)</option>
                                <option value="KG">Quilograma (KG)</option>
                                <option value="L">Litro (L)</option>
                                <option value="M">Metro (M)</option>
                                <option value="M2">Metro Quadrado (M²)</option>
                                <option value="CX">Caixa (CX)</option>
                            </select>
                        </div>
                    </div>



                    <div class="form-group">
                        <label>Tipo de Produto:</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="tipoProduto" value="1" required>
                                <span>Tipo 1 - Isento</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="tipoProduto" value="2"  required>
                                <span>Tipo 2 - 8%</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="tipoProduto" value="3" required>
                                <span>Tipo 3 - 10%</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="tipoProduto" value="4" required>              
                                <span>Tipo 4 - 12%</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="tipoProduto" value="5" required>
                                <span>Tipo 5 - 17%</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Adicionar Produto</button>
                </form>
            </section>



            <!-- LISTAGEM DE PRODUTOS -->
            <section class="listagem-section">
                <h2>Produtos Cadastrados</h2>
                <div id="produtosList" class="produtos-lista">
                    <p class="empty-message">Nenhum produto cadastrado ainda.</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 - Cálculo Imposto Produtos | SENAI CETCC</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
